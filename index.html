<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Flappy Road · Fullscreen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: manipulation;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #gameContainer {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #1a2332, #0a0f18);
      position: relative;
      overflow: hidden;
    }
    canvas {
      display: block;
      border-radius: 8px;
      background: #0f1822;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      touch-action: none;
      image-rendering: auto;
    }
    .ui-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      pointer-events: none;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 0 8px;
      pointer-events: auto;
    }
    .hearts-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hearts {
      font-size: 1.3rem;
      letter-spacing: 3px;
      line-height: 1;
    }
    .btn-buy-life {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 0 #a93226;
      transition: 0.05s;
    }
    .btn-buy-life:active {
      transform: translateY(2px);
      box-shadow: none;
    }
    .btn-buy-life:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .diff-badge {
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .coins-badge {
      background: #f0a04b;
      color: #161c28;
      padding: 5px 14px;
      border-radius: 30px;
      font-weight: 800;
      font-size: 0.85rem;
      box-shadow: 0 0 10px rgba(240,160,75,0.5);
    }
    .btn-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 500px;
      justify-content: center;
      padding: 0 8px;
      pointer-events: auto;
    }
    .btn {
      border: none;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.06s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      min-width: 45px;
      max-width: 110px;
      padding: 12px 8px;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.3);
    }
    .btn-up {
      background: linear-gradient(180deg, #4CAF50, #2E7D32);
      color: #fff;
    }
    .btn-down {
      background: linear-gradient(180deg, #2196F3, #1565C0);
      color: #fff;
    }
    .btn-life {
      background: linear-gradient(180deg, #e74c3c, #a93226);
      color: #fff;
      max-width: 60px;
    }
    .btn-restart {
      background: linear-gradient(180deg, #FF9800, #E65100);
      color: #fff;
      max-width: 60px;
    }
    .btn-shop {
      background: linear-gradient(180deg, #9C27B0, #6A1B9A);
      color: #fff;
      max-width: 60px;
    }
    .shop-overlay {
      display: none;
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 380px;
      background: #1e2a3a;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      z-index: 20;
      pointer-events: auto;
      max-height: 55vh;
      overflow-y: auto;
    }
    .shop-overlay.show {
      display: block;
    }
    .shop-title {
      color: #f7da6c;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 10px;
    }
    .shop-section {
      margin-bottom: 12px;
    }
    .shop-section-title {
      color: #aaa;
      font-size: 0.7rem;
      margin-bottom: 6px;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .skin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .skin-card {
      background: #232d3d;
      border-radius: 12px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
      position: relative;
    }
    .skin-card.active {
      border-color: #f7da6c;
      box-shadow: 0 0 15px rgba(247,218,108,0.4);
      background: #2a3550;
    }
    .skin-card.locked {
      opacity: 0.6;
    }
    .skin-emoji {
      font-size: 1.8rem;
      display: block;
      margin-bottom: 2px;
    }
    .skin-name {
      color: #ddd;
      font-size: 0.65rem;
      font-weight: bold;
    }
    .skin-status {
      font-size: 0.6rem;
      margin-top: 2px;
    }
    .skin-status.owned {
      color: #27ae60;
    }
    .skin-status.price {
      color: #f0a04b;
      font-weight: bold;
    }
    .vip-tag {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ffd700;
      color: #000;
      border-radius: 8px;
      padding: 1px 5px;
      font-size: 0.5rem;
      font-weight: bold;
    }
    .upgrade-row {
      background: #232d3d;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .upgrade-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upgrade-info span {
      font-size: 1.5rem;
    }
    .upgrade-text strong {
      color: #ddd;
      font-size: 0.8rem;
    }
    .upgrade-text small {
      color: #999;
      font-size: 0.6rem;
      display: block;
    }
    .btn-upgrade {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .btn-upgrade:active {
      background: #c0392b;
    }
    .btn-upgrade:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .btn-close-shop {
      background: #555;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 10px auto 0;
      font-size: 0.8rem;
    }
    @media (max-width: 400px) {
      .btn {
        padding: 10px 6px;
        font-size: 0.7rem;
      }
      .hearts {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  
  <div class="ui-layer">
    <div class="stats-row">
      <div class="hearts-container">
        <span class="hearts" id="heartsDisplay">❤️❤️❤️</span>
        <button class="btn-buy-life" id="btnBuyLife" title="Купить жизнь (500 монет)">+❤️</button>
      </div>
      <span class="diff-badge" id="diffDisplay">⚡ ЛЕГКО</span>
      <span class="coins-badge" id="coinsDisplay">🪙 0</span>
    </div>
    
    <div class="btn-row">
      <button class="btn btn-up" id="btnUp">⬆️ ВВЕРХ</button>
      <button class="btn btn-down" id="btnDown">⬇️ ВНИЗ</button>
      <button class="btn btn-life" id="btnLife">❤️</button>
      <button class="btn btn-restart" id="btnRestart">🔄</button>
      <button class="btn btn-shop" id="btnShop">🛒</button>
    </div>
  </div>
  
  <div class="shop-overlay" id="shopOverlay">
    <div class="shop-title">🛍️ МАГАЗИН</div>
    
    <div class="shop-section">
      <div class="shop-section-title">💎 Улучшения</div>
      <div class="upgrade-row">
        <div class="upgrade-info">
          <span>❤️</span>
          <div class="upgrade-text">
            <strong>Дополнительная жизнь</strong>
            <small>Максимум 5</small>
          </div>
        </div>
        <button class="btn-upgrade" id="btnShopLife">500 🪙</button>
      </div>
    </div>
    
    <div class="shop-section">
      <div class="shop-section-title">🎨 Скины</div>
      <div class="skin-grid" id="skinGrid"></div>
    </div>
    
    <button class="btn-close-shop" id="btnCloseShop">✕ Закрыть</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('gameContainer');
  
  // ─── КОНСТАНТЫ ИГРОВОГО МИРА ───
  const WORLD_W = 400;
  const WORLD_H = 600;
  const CEILING = 55;
  const GROUND_Y = WORLD_H - 70;
  const LIFE_COST = 500;
  const MAX_LIVES_CAP = 5;
  
  // ─── АДАПТИВНЫЙ РАЗМЕР КАНВАСА ───
  function resize() {
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    const uiHeight = 100;
    const availH = ch - uiHeight;
    const ratio = WORLD_W / WORLD_H;
    
    let displayW, displayH;
    
    if (cw / availH > ratio) {
      displayH = Math.min(availH, WORLD_H);
      displayW = displayH * ratio;
    } else {
      displayW = Math.min(cw, WORLD_W);
      displayH = displayW / ratio;
    }
    
    canvas.width = WORLD_W;
    canvas.height = WORLD_H;
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
  }
  
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));
  resize();
  
  // ─── DOM ЭЛЕМЕНТЫ ───
  const $hearts = document.getElementById('heartsDisplay');
  const $coins = document.getElementById('coinsDisplay');
  const $diff = document.getElementById('diffDisplay');
  const $shop = document.getElementById('shopOverlay');
  const $skinGrid = document.getElementById('skinGrid');
  const $btnBuyLife = document.getElementById('btnBuyLife');
  const $btnShopLife = document.getElementById('btnShopLife');
  
  // ─── ДАННЫЕ ───
  let totalCoins = 0;
  let maxLives = 3;
  let equippedSkin = 'default';
  
  const skins = [
    { id: 'default', name: 'Птенчик', emoji: '🐤', cost: 0, owned: true, body: '#4ecdc4', eye: '#44bd9e' },
    { id: 'dragon', name: 'Дракон', emoji: '🐲', cost: 80, owned: false, body: '#e74c3c', eye: '#ff6b35' },
    { id: 'robot', name: 'Робот', emoji: '🤖', cost: 120, owned: false, body: '#95a5a6', eye: '#3498db' },
    { id: 'ninja', name: 'Ниндзя', emoji: '🥷', cost: 150, owned: false, body: '#2c3e50', eye: '#e74c3c' },
    { id: 'unicorn', name: 'Единорог', emoji: '🦄', cost: 200, owned: false, body: '#e8a0bf', eye: '#9b59b6' },
    { id: 'phoenix', name: '👑 Феникс', emoji: '🔥', cost: 350, owned: false, body: '#ff6b35', eye: '#ffd700', vip: true },
  ];
  
  // ─── ЗАГРУЗКА/СОХРАНЕНИЕ ───
  function load() {
    try {
      totalCoins = parseInt(localStorage.flappyCoins || '0');
      maxLives = Math.min(MAX_LIVES_CAP, Math.max(3, parseInt(localStorage.flappyMaxLives || '3')));
      equippedSkin = localStorage.flappySkin || 'default';
      skins.forEach(s => {
        if (s.id !== 'default') s.owned = localStorage['flappy_own_' + s.id] === 'true';
      });
    } catch(e) {}
  }
  
  function save() {
    try {
      localStorage.flappyCoins = totalCoins;
      localStorage.flappyMaxLives = maxLives;
      localStorage.flappySkin = equippedSkin;
      skins.forEach(s => {
        if (s.id !== 'default') localStorage['flappy_own_' + s.id] = s.owned;
      });
    } catch(e) {}
  }
  
  load();
  
  function getSkin() {
    return skins.find(s => s.id === equippedSkin) || skins[0];
  }
  
  // ─── ИГРОВОЕ СОСТОЯНИЕ ───
  let gameActive = false;
  let score = 0;
  let ticks = 0;
  let diffLevel = 1;
  let flapCount = 0;
  let flapCooldown = 0;
  let inputQueue = { flap: false, dive: false };
  
  const player = {
    x: 85, y: 0, w: 40, h: 40,
    vy: 0,
    hp: 3,
    invTimer: 0,
    gravity: 0.38,
    jumpPower: -6.5
  };
  
  let obstacles = [];
  let coins = [];
  let particles = [];
  let spawnTimer = 0;
  let coinTimer = 0;
  let worldSpeed = 4.0;
  
  function resetGame() {
    gameActive = true;
    player.y = WORLD_H/2 - 22;
    player.vy = 0;
    player.hp = maxLives;
    player.invTimer = 0;
    obstacles = [];
    coins = [];
    particles = [];
    score = 0;
    ticks = 0;
    diffLevel = 1;
    flapCount = 0;
    flapCooldown = 0;
    spawnTimer = 0;
    coinTimer = 0;
    worldSpeed = 4.0;
    inputQueue = { flap: false, dive: false };
    updateUI();
  }
  
  function updateUI() {
    let h = '';
    for (let i = 0; i < maxLives; i++) h += i < player.hp ? '❤️' : '🖤';
    $hearts.textContent = h;
    $coins.textContent = `🪙 ${totalCoins}`;
    
    const levels = [
      { min: 1, text: '⚡ ЛЕГКО', color: '#27ae60' },
      { min: 4, text: '⚠️ СРЕДНЕ', color: '#f39c12' },
      { min: 7, text: '🔥 СЛОЖНО', color: '#e74c3c' },
      { min: 9, text: '💀 ХАРД', color: '#8e44ad' },
    ];
    const lvl = levels.find(l => diffLevel >= l.min) || levels[0];
    $diff.textContent = lvl.text;
    $diff.style.background = lvl.color;
    
    $btnBuyLife.disabled = maxLives >= MAX_LIVES_CAP;
    $btnBuyLife.textContent = maxLives >= MAX_LIVES_CAP ? '✓ Макс' : `+❤️ ${LIFE_COST}🪙`;
    $btnShopLife.disabled = maxLives >= MAX_LIVES_CAP;
    $btnShopLife.textContent = maxLives >= MAX_LIVES_CAP ? '✓ Максимум' : `${LIFE_COST} 🪙`;
  }
  
  function buyLife() {
    if (maxLives >= MAX_LIVES_CAP) return;
    if (totalCoins >= LIFE_COST) {
      totalCoins -= LIFE_COST;
      maxLives++;
      player.hp = maxLives;
      save();
      updateUI();
      renderShop();
    } else {
      alert(`Недостаточно монет! Нужно ${LIFE_COST} 🪙`);
    }
  }
  
  function buySkin(id) {
    const skin = skins.find(s => s.id === id);
    if (!skin || skin.owned) return;
    if (totalCoins >= skin.cost) {
      totalCoins -= skin.cost;
      skin.owned = true;
      equippedSkin = id;
      save();
      updateUI();
      renderShop();
    } else {
      alert(`Недостаточно монет! Нужно ${skin.cost} 🪙`);
    }
  }
  
  function equipSkin(id) {
    const skin = skins.find(s => s.id === id);
    if (skin && skin.owned) {
      equippedSkin = id;
      save();
      updateUI();
      renderShop();
    }
  }
  
  function renderShop() {
    $skinGrid.innerHTML = '';
    skins.forEach(skin => {
      const card = document.createElement('div');
      card.className = 'skin-card';
      if (equippedSkin === skin.id) card.classList.add('active');
      if (!skin.owned) card.classList.add('locked');
      
      card.innerHTML = `
        ${skin.vip ? '<div class="vip-tag">VIP</div>' : ''}
        <span class="skin-emoji">${skin.emoji}</span>
        <div class="skin-name">${skin.name}</div>
        <div class="skin-status ${skin.owned ? 'owned' : 'price'}">${skin.owned ? '✅ Выбрать' : `🪙 ${skin.cost}`}</div>
      `;
      
      card.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (skin.owned) equipSkin(skin.id);
        else buySkin(skin.id);
      });
      
      $skinGrid.appendChild(card);
    });
  }
  
  // ─── СТОЛКНОВЕНИЯ ───
  function rectHit(a, b) {
    return !(b.x > a.x + a.w || b.x + b.w < a.x || b.y > a.y + a.h || b.y + b.h < a.y);
  }
  
  function circHit(x1, y1, r1, x2, y2, r2) {
    return Math.hypot(x1 - x2, y1 - y2) < r1 + r2;
  }
  
  // ─── ИГРОВАЯ ЛОГИКА ───
  function hurtPlayer() {
    if (!gameActive || player.invTimer > 0) return;
    player.hp--;
    player.invTimer = 35;
    if (player.hp <= 0) {
      player.hp = 0;
      gameActive = false;
    }
    updateUI();
  }
  
  function doFlap() {
    if (!gameActive) return;
    if (player.y <= CEILING + 20) { player.vy = Math.max(player.vy, -2); return; }
    if (flapCount >= 5) return;
    player.vy = player.jumpPower;
    flapCount++;
    flapCooldown = 18;
    
    const skin = getSkin();
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: player.x + player.w/2, y: player.y + player.h,
        vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 - 1,
        life: 16, maxLife: 16, color: skin.body
      });
    }
  }
  
  function spawnObstacles() {
    if (!gameActive) return;
    const count = diffLevel >= 7 ? 3 : 2;
    const positions = ['top', 'bottom'];
    if (count >= 3 || Math.random() < 0.3) positions.push('center');
    
    positions.forEach((pos, i) => {
      let y, w, h, type;
      const r = Math.random();
      
      if (pos === 'top') {
        w = 50 + Math.random() * 30;
        h = 24 + Math.random() * 16;
        y = CEILING + 10 + Math.random() * 55;
        type = r < 0.5 ? 'car' : 'log';
      } else if (pos === 'bottom') {
        w = 50 + Math.random() * 30;
        h = 24 + Math.random() * 16;
        y = GROUND_Y - h - Math.random() * 50;
        type = r < 0.5 ? 'car' : 'log';
      } else {
        w = 20; h = 50 + Math.random() * 40;
        y = 200 + Math.random() * 200;
        type = 'pole';
      }
      
      obstacles.push({
        x: WORLD_W + 30 + i * 40, y, w, h, type, pos,
        active: true, passed: false
      });
    });
  }
  
  function spawnCoin() {
    if (!gameActive) return;
    coins.push({
      x: WORLD_W + 35,
      y: 160 + Math.random() * 260,
      r: 12, active: true
    });
  }
  
  function update() {
    if (!gameActive) { inputQueue.flap = false; return; }
    
    ticks++;
    if (ticks % 220 === 0 && diffLevel < 10) { diffLevel++; updateUI(); }
    worldSpeed = Math.min(12, 4.0 + (diffLevel-1) * 0.75);
    
    if (flapCooldown > 0) { flapCooldown--; if (flapCooldown <= 0) flapCount = 0; }
    if (inputQueue.flap) { doFlap(); inputQueue.flap = false; }
    if (inputQueue.dive) { player.vy = 5; inputQueue.dive = false; }
    
    player.vy += player.gravity;
    player.y += player.vy;
    if (player.y < CEILING) { player.y = CEILING; player.vy = Math.max(0, player.vy); }
    if (player.y + player.h > GROUND_Y) { player.y = GROUND_Y - player.h; player.vy = 0; flapCount = 0; }
    
    if (player.invTimer > 0) player.invTimer--;
    
    // Частицы
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    
    // Препятствия
    for (let i = obstacles.length-1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= worldSpeed;
      if (!o.passed && o.x + o.w < player.x) { o.passed = true; score += 5; }
      if (o.x + o.w < -40) obstacles.splice(i, 1);
    }
    
    // Монеты
    for (let i = coins.length-1; i >= 0; i--) {
      const c = coins[i];
      c.x -= worldSpeed;
      if (c.x + c.r < -20) coins.splice(i, 1);
    }
    
    // Столкновения
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    for (let i = obstacles.length-1; i >= 0; i--) {
      if (rectHit(pr, obstacles[i])) { hurtPlayer(); obstacles.splice(i, 1); break; }
    }
    
    // Сбор монет
    const pcx = player.x + player.w/2, pcy = player.y + player.h/2;
    for (let i = coins.length-1; i >= 0; i--) {
      if (circHit(pcx, pcy, 20, coins[i].x, coins[i].y, coins[i].r)) {
        coins.splice(i, 1);
        totalCoins += 10;
        score += 15;
        save();
        updateUI();
      }
    }
    
    if (--spawnTimer <= 0) {
      spawnObstacles();
      spawnTimer = Math.max(26, 55 - diffLevel * 3) + Math.floor(Math.random() * 16);
    }
    if (--coinTimer <= 0) {
      spawnCoin();
      coinTimer = Math.max(24, 40 - diffLevel * 1.5) + Math.floor(Math.random() * 18);
    }
  }
  
  // ─── ОТРИСОВКА ───
  function draw() {
    ctx.clearRect(0, 0, WORLD_W, WORLD_H);
    
    // Фон
    const grad = ctx.createLinearGradient(0, 0, WORLD_W, 0);
    grad.addColorStop(0, '#1a2332'); grad.addColorStop(1, '#2d3a4f');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, WORLD_W, WORLD_H);
    
    // Зоны
    ctx.fillStyle = 'rgba(231,76,60,0.06)';
    ctx.fillRect(0, CEILING, WORLD_W, 100);
    ctx.fillRect(0, WORLD_H-170, WORLD_W, 100);
    
    ctx.fillStyle = 'rgba(46,204,113,0.08)';
    ctx.fillRect(0, 200, WORLD_W, 200);
    ctx.strokeStyle = 'rgba(46,204,113,0.2)';
    ctx.lineWidth = 1; ctx.setLineDash([8, 8]);
    ctx.strokeRect(3, 200, WORLD_W-6, 200);
    ctx.setLineDash([]);
    
    // Линии движения
    ctx.strokeStyle = '#3f5068'; ctx.lineWidth = 1;
    for (let i = 0; i < WORLD_H; i += 45) {
      const off = (ticks * worldSpeed * 0.3) % 45;
      ctx.beginPath(); ctx.moveTo(0, i + off); ctx.lineTo(WORLD_W, i + off - 12); ctx.stroke();
    }
    
    // Земля
    ctx.fillStyle = '#3a2a1a'; ctx.fillRect(0, GROUND_Y, WORLD_W, 70);
    ctx.fillStyle = '#5e4a32'; ctx.fillRect(0, GROUND_Y, WORLD_W, 5);
    
    // Частицы
    particles.forEach(p => {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    // Монеты
    coins.forEach(c => {
      ctx.save();
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#FFC107'; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFA000'; ctx.beginPath(); ctx.arc(c.x-1, c.y-1, c.r-4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.fillText('🪙', c.x-9, c.y+6);
      ctx.restore();
    });
    
    // Препятствия
    obstacles.forEach(o => {
      ctx.save();
      ctx.shadowColor = '#00000060'; ctx.shadowBlur = 10;
      const colors = o.pos === 'top' ? ['#e74c3c','#c0392b'] : o.pos === 'bottom' ? ['#e67e22','#d35400'] : ['#8e44ad','#71368a'];
      
      if (o.type === 'pole') {
        ctx.fillStyle = colors[0]; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = colors[1]; ctx.fillRect(o.x+3, o.y+4, o.w-6, o.h-8);
      } else if (o.type === 'car') {
        ctx.fillStyle = colors[0]; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = colors[1]; ctx.fillRect(o.x+4, o.y+4, o.w-8, o.h-8);
        ctx.fillStyle = '#f39c12'; ctx.font = '16px sans-serif'; ctx.fillText('🚗', o.x+10, o.y+22);
      } else {
        ctx.fillStyle = colors[0]; ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = colors[1]; ctx.fillRect(o.x+3, o.y+3, o.w-6, o.h-6);
      }
      ctx.restore();
    });
    
    // Игрок
    const skin = getSkin();
    ctx.save();
    if (player.invTimer > 0 && Math.floor(Date.now()/100)%2 === 0) ctx.globalAlpha = 0.55;
    ctx.shadowColor = skin.vip ? '#ffd700' : skin.body;
    ctx.shadowBlur = skin.vip ? 22 : 14;
    
    ctx.fillStyle = skin.body;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(player.x, player.y, player.w, player.h, 12);
    else ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fill();
    
    ctx.fillStyle = skin.eye;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(player.x+4, player.y+4, player.w-8, player.h-8, 8);
    else ctx.fillRect(player.x+4, player.y+4, player.w-8, player.h-8);
    ctx.fill();
    
    // Глаза
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x+12, player.y+16, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(player.x+28, player.y+16, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(player.x+13, player.y+15, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(player.x+29, player.y+15, 2.5, 0, Math.PI*2); ctx.fill();
    
    // Клюв
    ctx.fillStyle = skin.vip ? '#ffd700' : '#f39c12';
    ctx.beginPath();
    ctx.moveTo(player.x+20, player.y+22);
    ctx.lineTo(player.x+14, player.y+27);
    ctx.lineTo(player.x+26, player.y+27);
    ctx.fill();
    
    if (skin.vip) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '14px sans-serif';
      ctx.fillText('👑', player.x+10, player.y-6);
    }
    
    ctx.restore();
    
    // HUD
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Скорость: ${worldSpeed.toFixed(1)}`, 8, CEILING + 16);
    ctx.fillText(`HP: ${player.hp}/${maxLives}`, 8, CEILING + 30);
    
    // Game Over
    if (!gameActive) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, WORLD_W, WORLD_H);
      ctx.fillStyle = '#f7da6c';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('💔 ИГРА ОКОНЧЕНА', WORLD_W/2, WORLD_H/2-25);
      ctx.font = '16px sans-serif';
      ctx.fillText(`Счёт: ${score} | Монеты: ${totalCoins}`, WORLD_W/2, WORLD_H/2+20);
      ctx.font = '13px sans-serif';
      ctx.fillText('Нажмите 🔄 для рестарта', WORLD_W/2, WORLD_H/2+50);
    }
  }
  
  // ─── ИГРОВОЙ ЦИКЛ ───
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  
  // ─── СОБЫТИЯ ───
  function setupEvents() {
    const $up = document.getElementById('btnUp');
    const $down = document.getElementById('btnDown');
    const $life = document.getElementById('btnLife');
    const $restart = document.getElementById('btnRestart');
    const $shopBtn = document.getElementById('btnShop');
    const $close = document.getElementById('btnCloseShop');
    
    $up.addEventListener('pointerdown', e => { e.preventDefault(); inputQueue.flap = true; });
    $down.addEventListener('pointerdown', e => { e.preventDefault(); inputQueue.dive = true; });
    $life.addEventListener('pointerdown', e => { e.preventDefault(); buyLife(); });
    $restart.addEventListener('pointerdown', e => { e.preventDefault(); resetGame(); });
    $shopBtn.addEventListener('pointerdown', e => { e.preventDefault(); $shop.classList.toggle('show'); if ($shop.classList.contains('show')) renderShop(); });
    $close.addEventListener('pointerdown', e => { e.preventDefault(); $shop.classList.remove('show'); });
    $btnBuyLife.addEventListener('pointerdown', e => { e.preventDefault(); buyLife(); });
    $btnShopLife.addEventListener('pointerdown', e => { e.preventDefault(); buyLife(); });
    
    // Клавиатура
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' || e.key === ' ' || e.code === 'Space') {
        e.preventDefault(); inputQueue.flap = true;
      } else if (e.key === 'ArrowDown') {
        e.preventDefault(); inputQueue.dive = true;
      } else if (e.key === 'r' || e.key === 'R') {
        e.preventDefault(); resetGame();
      } else if (e.key === 'l' || e.key === 'L') {
        e.preventDefault(); buyLife();
      }
    });
    
    // Тач по канвасу
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleY = WORLD_H / rect.height;
      const touchY = (e.touches[0].clientY - rect.top) * scaleY;
      if (touchY < WORLD_H * 0.5) inputQueue.flap = true;
      else inputQueue.dive = true;
    }, { passive: false });
    
    canvas.addEventListener('mousedown', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleY = WORLD_H / rect.height;
      const mouseY = (e.clientY - rect.top) * scaleY;
      if (mouseY < WORLD_H * 0.5) inputQueue.flap = true;
      else inputQueue.dive = true;
    });
    
    // Закрытие магазина по клику вне его
    document.addEventListener('pointerdown', e => {
      if ($shop.classList.contains('show') && !$shop.contains(e.target) && e.target !== document.getElementById('btnShop')) {
        $shop.classList.remove('show');
      }
    });
  }
  
  // ─── ПОЛИФИЛЛ ───
  if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
      ctx.beginPath();
      ctx.moveTo(x + r.tl, y);
      ctx.lineTo(x + w - r.tr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
      ctx.lineTo(x + w, y + h - r.br);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
      ctx.lineTo(x + r.bl, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
      ctx.lineTo(x, y + r.tl);
      ctx.quadraticCurveTo(x, y, x + r.tl, y);
      ctx.closePath();
    };
  }
  
  // ─── ЗАПУСК ───
  resetGame();
  updateUI();
  renderShop();
  setupEvents();
  requestAnimationFrame(loop);
})();
</script>
