<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flappy Road">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1117">
  
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Flappy%20Road%22%2C%22short_name%22%3A%22FlappyRoad%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22fullscreen%22%2C%22orientation%22%3A%22any%22%2C%22background_color%22%3A%22%230d1117%22%2C%22theme_color%22%3A%22%230d1117%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'192'%20height%3D'192'%3E%253Crect%20width%3D'192'%20height%3D'192'%20rx%3D'40'%20fill%3D'%231a2332'%2F%3E%253Ctext%20x%3D'96'%20y%3D'120'%20font-size%3D'80'%20text-anchor%3D'middle'%3E%25F0%259F%2590%25A4%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  
  <title>Flappy Road</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: manipulation;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #gameContainer {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #1a2332, #0a0f18);
      position: relative;
      overflow: hidden;
    }
    canvas {
      display: block;
      border-radius: 8px;
      background: #0f1822;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      touch-action: none;
    }
    .top-buttons {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 15;
      pointer-events: auto;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    /* Кнопка установки */
    .install-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      pointer-events: auto;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .install-dialog {
      background: linear-gradient(165deg, #1e2a3a, #0f1822);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 350px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.1);
    }
    .install-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 15px;
    }
    .install-title {
      color: #f7da6c;
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .install-text {
      color: #ccc;
      font-size: 0.9rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .install-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-install {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
      transition: 0.2s;
    }
    .btn-install:hover {
      transform: scale(1.02);
    }
    .btn-install:active {
      transform: scale(0.95);
    }
    .btn-install.downloading {
      background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
      pointer-events: none;
    }
    .btn-skip {
      background: transparent;
      color: #aaa;
      border: 1px solid #555;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-skip:hover {
      color: #fff;
      border-color: #888;
    }
    .download-progress {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-top: 15px;
      overflow: hidden;
      display: none;
    }
    .download-progress.show {
      display: block;
    }
    .download-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      width: 0%;
      transition: width 0.2s;
    }
    
    .ui-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px;
      pointer-events: none;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 0 8px;
      pointer-events: auto;
    }
    .hearts-container { display: flex; align-items: center; gap: 6px; }
    .hearts { font-size: 1.3rem; letter-spacing: 3px; line-height: 1; }
    .btn-buy-life {
      background: #e74c3c; color: #fff; border: none;
      padding: 4px 10px; border-radius: 15px; font-size: 0.7rem;
      font-weight: bold; cursor: pointer; white-space: nowrap;
      box-shadow: 0 2px 0 #a93226;
    }
    .btn-buy-life:active { transform: translateY(2px); box-shadow: none; }
    .btn-buy-life:disabled { opacity: 0.4; pointer-events: none; }
    .diff-badge { color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
    .coins-badge {
      background: #f0a04b; color: #161c28; padding: 5px 14px;
      border-radius: 30px; font-weight: 800; font-size: 0.85rem;
      box-shadow: 0 0 10px rgba(240,160,75,0.5);
    }
    .btn-row {
      display: flex; gap: 8px; width: 100%; max-width: 500px;
      justify-content: center; padding: 0 8px; pointer-events: auto;
    }
    .btn {
      border: none; font-weight: bold; text-transform: uppercase;
      border-radius: 40px; cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center; gap: 4px;
      flex: 1; min-width: 45px; max-width: 110px; padding: 12px 8px; font-size: 0.8rem;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
    .btn-up { background: linear-gradient(180deg, #4CAF50, #2E7D32); color: #fff; }
    .btn-down { background: linear-gradient(180deg, #2196F3, #1565C0); color: #fff; }
    .btn-life { background: linear-gradient(180deg, #e74c3c, #a93226); color: #fff; max-width: 60px; }
    .btn-restart { background: linear-gradient(180deg, #FF9800, #E65100); color: #fff; max-width: 60px; }
    .btn-shop { background: linear-gradient(180deg, #9C27B0, #6A1B9A); color: #fff; max-width: 60px; }
    
    .shop-overlay {
      display: none; position: absolute; bottom: 90px; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 420px;
      background: #1e2a3a; border-radius: 16px; padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      z-index: 20; pointer-events: auto; max-height: 60vh; overflow-y: auto;
    }
    .shop-overlay.show { display: block; }
    .shop-title { color: #f7da6c; font-weight: bold; font-size: 1rem; text-align: center; margin-bottom: 10px; }
    .shop-section { margin-bottom: 14px; }
    .shop-section-title { color: #aaa; font-size: 0.7rem; margin-bottom: 8px; padding-left: 4px; text-transform: uppercase; }
    .skin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .skin-card {
      background: #232d3d; border-radius: 12px; padding: 8px 4px; text-align: center;
      cursor: pointer; border: 2px solid transparent; transition: 0.2s; position: relative;
    }
    .skin-card.active { border-color: #f7da6c; box-shadow: 0 0 15px rgba(247,218,108,0.5); background: #2a3550; }
    .skin-card.locked { opacity: 0.6; }
    .skin-card.vip-card { border: 2px solid #ffd700; background: #2a1f3d; }
    .skin-emoji { font-size: 1.6rem; display: block; margin-bottom: 2px; }
    .skin-name { color: #ddd; font-size: 0.6rem; font-weight: bold; }
    .skin-rarity { font-size: 0.5rem; margin: 1px 0; font-weight: bold; }
    .rarity-common { color: #95a5a6; } .rarity-rare { color: #3498db; } .rarity-epic { color: #9b59b6; } .rarity-legendary { color: #f39c12; }
    .skin-status { font-size: 0.55rem; margin-top: 2px; }
    .skin-status.owned { color: #27ae60; } .skin-status.price { color: #f0a04b; }
    .vip-tag { position: absolute; top: -5px; right: -5px; background: #ffd700; color: #000; border-radius: 8px; padding: 1px 5px; font-size: 0.5rem; font-weight: bold; z-index: 1; }
    .upgrade-row { background: #232d3d; border-radius: 12px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
    .upgrade-info { display: flex; align-items: center; gap: 8px; }
    .upgrade-info span { font-size: 1.5rem; }
    .upgrade-text strong { color: #ddd; font-size: 0.8rem; }
    .upgrade-text small { color: #999; font-size: 0.6rem; display: block; }
    .btn-upgrade { background: #e74c3c; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
    .btn-upgrade:disabled { opacity: 0.4; }
    .btn-close-shop { background: #555; color: #fff; border: none; padding: 10px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; display: block; margin: 12px auto 0; font-size: 0.8rem; }
    .hint-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.3); font-size: 0.8rem;
      pointer-events: none;
    }
    @media (display-mode: standalone) {
      .install-overlay { display: none !important; }
    }
  </style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  
  <!-- Окно установки -->
  <div class="install-overlay" id="installOverlay">
    <div class="install-dialog">
      <span class="install-icon">🐤</span>
      <div class="install-title">Скачать Flappy Road</div>
      <div class="install-text">
        Игра сохранится на ваш компьютер как HTML-файл. Запускайте в любое время без интернета!
      </div>
      <div class="install-buttons">
        <button class="btn-install" id="btnDownloadApp">
          💾 Скачать игру
        </button>
        <button class="btn-skip" id="btnSkipDownload">
          Играть в браузере
        </button>
      </div>
      <div class="download-progress" id="downloadProgress">
        <div class="download-progress-bar" id="downloadProgressBar"></div>
      </div>
    </div>
  </div>
  
  <div class="top-buttons">
    <button class="icon-btn" id="btnFullscreen" title="Полный экран (F)">⛶</button>
  </div>
  
  <div class="ui-layer">
    <div class="stats-row">
      <div class="hearts-container">
        <span class="hearts" id="heartsDisplay">❤️❤️❤️</span>
        <button class="btn-buy-life" id="btnBuyLife" title="Купить жизнь (500 монет)">+❤️</button>
      </div>
      <span class="diff-badge" id="diffDisplay">⚡ ЛЕГКО</span>
      <span class="coins-badge" id="coinsDisplay">🪙 0</span>
    </div>
    
    <div class="btn-row">
      <button class="btn btn-up" id="btnUp">⬆️ ВВЕРХ</button>
      <button class="btn btn-down" id="btnDown">⬇️ ВНИЗ</button>
      <button class="btn btn-life" id="btnLife">❤️</button>
      <button class="btn btn-restart" id="btnRestart">🔄</button>
      <button class="btn btn-shop" id="btnShop">🛒</button>
    </div>
  </div>
  
  <div class="shop-overlay" id="shopOverlay">
    <div class="shop-title">🛍️ МАГАЗИН СКИНОВ</div>
    <div class="shop-section">
      <div class="shop-section-title">💎 Улучшения</div>
      <div class="upgrade-row">
        <div class="upgrade-info"><span>❤️</span><div class="upgrade-text"><strong>Дополнительная жизнь</strong><small>Максимум 5</small></div></div>
        <button class="btn-upgrade" id="btnShopLife">500 🪙</button>
      </div>
    </div>
    <div class="shop-section">
      <div class="shop-section-title">🎨 Скины персонажей</div>
      <div class="skin-grid" id="skinGrid"></div>
    </div>
    <button class="btn-close-shop" id="btnCloseShop">✕ Закрыть магазин</button>
  </div>
  
  <div class="hint-text" id="hintText">ПРОБЕЛ / СТРЕЛКА ВВЕРХ</div>
</div>

<script>
// ─── ФУНКЦИЯ СКАЧИВАНИЯ ИГРЫ ───
function downloadGame() {
  const btnDownload = document.getElementById('btnDownloadApp');
  const progressBar = document.getElementById('downloadProgressBar');
  const progressContainer = document.getElementById('downloadProgress');
  const installOverlay = document.getElementById('installOverlay');
  
  // Меняем кнопку на статус загрузки
  btnDownload.textContent = '⏳ Загрузка...';
  btnDownload.classList.add('downloading');
  progressContainer.classList.add('show');
  
  // Имитируем прогресс загрузки
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 25;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      progressBar.style.width = '100%';
      
      // Создаем и скачиваем файл
      setTimeout(() => {
        const gameHTML = document.documentElement.outerHTML;
        const blob = new Blob(['<!DOCTYPE html>\n' + gameHTML], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'flappy-road.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        // Показываем успешное завершение
        btnDownload.textContent = '✅ Скачано!';
        setTimeout(() => {
          installOverlay.style.display = 'none';
        }, 1500);
      }, 500);
    }
    progressBar.style.width = progress + '%';
  }, 200);
}

// ─── PWA Service Worker ───
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      const CACHE = 'flappy-v11';
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(cached => cached || fetch(e.request))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
  });
}

// ─── PWA Install ───
let deferredPrompt;
const installOverlay = document.getElementById('installOverlay');
const btnDownloadApp = document.getElementById('btnDownloadApp');
const btnSkipDownload = document.getElementById('btnSkipDownload');

// Проверяем, установлено ли уже приложение
if (window.matchMedia('(display-mode: standalone)').matches) {
  installOverlay.style.display = 'none';
}

// Сохраняем событие установки для мобильных
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

// Кнопка скачивания
btnDownloadApp.addEventListener('click', () => {
  // Определяем устройство
  const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
  
  if (isMobile && deferredPrompt) {
    // На мобильном показываем нативный диалог PWA
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        installOverlay.style.display = 'none';
      }
      deferredPrompt = null;
    });
  } else {
    // На ПК или если PWA недоступен - скачиваем HTML файл
    downloadGame();
  }
});

// Кнопка пропуска
btnSkipDownload.addEventListener('click', () => {
  installOverlay.style.display = 'none';
});

// Скрываем окно после установки PWA
window.addEventListener('appinstalled', () => {
  installOverlay.style.display = 'none';
});

// ─── ИГРА ───
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  const container = document.getElementById('gameContainer');
  const hintText = document.getElementById('hintText');
  
  const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || 
                   ('ontouchstart' in window && window.innerWidth < 1024);
  
  const WORLD_W = 400;
  const WORLD_H = 600;
  const LIFE_COST = 500;
  const MAX_LIVES_CAP = 5;
  
  let CEILING = 55;
  let GROUND_Y = WORLD_H - 70;
  let currentWorldW = WORLD_W;
  let currentWorldH = WORLD_H;
  let isLandscape = false;
  
  function resize() {
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    
    isLandscape = cw > ch;
    
    if (isLandscape) {
      currentWorldW = Math.max(WORLD_W, Math.floor(WORLD_H * (cw / ch)));
      currentWorldH = WORLD_H;
    } else {
      currentWorldW = WORLD_W;
      currentWorldH = WORLD_H;
    }
    
    CEILING = isLandscape ? 40 : 55;
    GROUND_Y = currentWorldH - (isLandscape ? 50 : 70);
    
    const uiHeight = 90;
    const availH = ch - uiHeight;
    const availW = cw;
    const ratio = currentWorldW / currentWorldH;
    
    let displayW, displayH;
    
    if (availW / availH > ratio) {
      displayH = availH;
      displayW = displayH * ratio;
    } else {
      displayW = availW;
      displayH = displayW / ratio;
    }
    
    canvas.width = currentWorldW;
    canvas.height = currentWorldH;
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    
    if (gameActive || !gameStarted) {
      player.y = Math.min(player.y, GROUND_Y - player.h);
      player.y = Math.max(player.y, CEILING);
    }
  }
  
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));
  
  document.getElementById('btnFullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });
  
  const $hearts = document.getElementById('heartsDisplay');
  const $coins = document.getElementById('coinsDisplay');
  const $diff = document.getElementById('diffDisplay');
  const $shop = document.getElementById('shopOverlay');
  const $skinGrid = document.getElementById('skinGrid');
  const $btnBuyLife = document.getElementById('btnBuyLife');
  const $btnShopLife = document.getElementById('btnShopLife');
  
  let totalCoins = 0;
  let maxLives = 3;
  let equippedSkin = 'default';
  
  const skins = [
    { id: 'default', name: 'Птенчик', emoji: '🐤', cost: 0, owned: true, body: '#4ecdc4', eye: '#44bd9e', rarity: 'common', effect: null },
    { id: 'dragon', name: 'Дракон', emoji: '🐲', cost: 80, owned: false, body: '#e74c3c', eye: '#ff6b35', rarity: 'rare', effect: 'fire' },
    { id: 'robot', name: 'Робот', emoji: '🤖', cost: 120, owned: false, body: '#7f8c8d', eye: '#3498db', rarity: 'rare', effect: 'electric' },
    { id: 'ninja', name: 'Ниндзя', emoji: '🥷', cost: 150, owned: false, body: '#2c3e50', eye: '#e74c3c', rarity: 'epic', effect: 'shadow' },
    { id: 'unicorn', name: 'Единорог', emoji: '🦄', cost: 200, owned: false, body: '#e8a0bf', eye: '#9b59b6', rarity: 'epic', effect: 'sparkle' },
    { id: 'phoenix', name: '👑 Феникс', emoji: '🔥', cost: 350, owned: false, body: '#ff6b35', eye: '#ffd700', rarity: 'legendary', effect: 'phoenix', vip: true },
    { id: 'alien', name: 'Пришелец', emoji: '👽', cost: 180, owned: false, body: '#2ecc71', eye: '#27ae60', rarity: 'rare', effect: 'toxic' },
    { id: 'shark', name: 'Акула', emoji: '🦈', cost: 220, owned: false, body: '#5d6d7e', eye: '#e74c3c', rarity: 'epic', effect: 'water' },
    { id: 'panda', name: 'Панда', emoji: '🐼', cost: 160, owned: false, body: '#ecf0f1', eye: '#2c3e50', rarity: 'rare', effect: null },
    { id: 'tiger', name: 'Тигр', emoji: '🐯', cost: 250, owned: false, body: '#f39c12', eye: '#e74c3c', rarity: 'epic', effect: 'fire' },
    { id: 'ghost', name: 'Призрак', emoji: '👻', cost: 280, owned: false, body: '#bdc3c7', eye: '#8e44ad', rarity: 'epic', effect: 'shadow' },
    { id: 'cyber', name: 'Кибер', emoji: '🦾', cost: 400, owned: false, body: '#00ffff', eye: '#ff00ff', rarity: 'legendary', effect: 'electric', vip: true },
  ];
  
  function load() {
    try {
      totalCoins = parseInt(localStorage.flappyCoins || '0');
      maxLives = Math.min(MAX_LIVES_CAP, Math.max(3, parseInt(localStorage.flappyMaxLives || '3')));
      equippedSkin = localStorage.flappySkin || 'default';
      skins.forEach(s => {
        if (s.id !== 'default') s.owned = localStorage['flappy_own_' + s.id] === 'true';
      });
    } catch(e) {}
  }
  
  function save() {
    try {
      localStorage.flappyCoins = totalCoins;
      localStorage.flappyMaxLives = maxLives;
      localStorage.flappySkin = equippedSkin;
      skins.forEach(s => {
        if (s.id !== 'default') localStorage['flappy_own_' + s.id] = s.owned;
      });
    } catch(e) {}
  }
  
  load();
  
  function getSkin() { return skins.find(s => s.id === equippedSkin) || skins[0]; }
  
  let gameActive = false;
  let score = 0;
  let ticks = 0;
  let diffLevel = 1;
  let flapCount = 0;
  let flapCooldown = 0;
  let inputQueue = { flap: false, dive: false };
  
  const player = {
    x: 85, y: 0, w: 40, h: 40,
    vy: 0, hp: 3, invTimer: 0,
    gravity: 0.35,
    jumpPower: isMobile ? -8.2 : -7.0,
    maxFlaps: isMobile ? 7 : 5
  };
  
  let obstacles = [];
  let coins = [];
  let particles = [];
  let spawnTimer = 0;
  let coinTimer = 0;
  let worldSpeed = 4.0;
  let gameStarted = false;
  
  function resetGame() {
    gameActive = true;
    gameStarted = true;
    player.y = currentWorldH/2 - 22;
    player.vy = 0;
    player.hp = maxLives;
    player.invTimer = 0;
    obstacles = [];
    coins = [];
    particles = [];
    score = 0;
    ticks = 0;
    diffLevel = 1;
    flapCount = 0;
    flapCooldown = 0;
    spawnTimer = 0;
    coinTimer = 0;
    worldSpeed = 4.0;
    inputQueue = { flap: false, dive: false };
    hintText.style.display = 'none';
    updateUI();
  }
  
  function updateUI() {
    let h = '';
    for (let i = 0; i < maxLives; i++) h += i < player.hp ? '❤️' : '🖤';
    $hearts.textContent = h;
    $coins.textContent = `🪙 ${totalCoins}`;
    
    const lvls = [{min:1,t:'⚡ ЛЕГКО',c:'#27ae60'},{min:4,t:'⚠️ СРЕДНЕ',c:'#f39c12'},{min:7,t:'🔥 СЛОЖНО',c:'#e74c3c'},{min:9,t:'💀 ХАРД',c:'#8e44ad'}];
    const l = lvls.find(x => diffLevel >= x.min) || lvls[0];
    $diff.textContent = l.t; $diff.style.background = l.c;
    
    $btnBuyLife.disabled = maxLives >= MAX_LIVES_CAP;
    $btnBuyLife.textContent = maxLives >= MAX_LIVES_CAP ? '✓ Макс' : `+❤️ ${LIFE_COST}🪙`;
    $btnShopLife.disabled = maxLives >= MAX_LIVES_CAP;
    $btnShopLife.textContent = maxLives >= MAX_LIVES_CAP ? '✓ Максимум' : `${LIFE_COST} 🪙`;
  }
  
  function buyLife() {
    if (maxLives >= MAX_LIVES_CAP) return;
    if (totalCoins >= LIFE_COST) {
      totalCoins -= LIFE_COST;
      maxLives++;
      player.hp = maxLives;
      save();
      updateUI();
      renderShop();
    } else alert(`Нужно ${LIFE_COST} 🪙`);
  }
  
  function buySkin(id) {
    const s = skins.find(x => x.id === id);
    if (!s || s.owned) return;
    if (totalCoins >= s.cost) {
      totalCoins -= s.cost;
      s.owned = true;
      equippedSkin = id;
      save();
      updateUI();
      renderShop();
    } else alert(`Нужно ${s.cost} 🪙`);
  }
  
  function equipSkin(id) {
    const s = skins.find(x => x.id === id);
    if (s && s.owned) { equippedSkin = id; save(); updateUI(); renderShop(); }
  }
  
  function renderShop() {
    $skinGrid.innerHTML = '';
    skins.forEach(skin => {
      const card = document.createElement('div');
      card.className = 'skin-card';
      if (equippedSkin === skin.id) card.classList.add('active');
      if (!skin.owned) card.classList.add('locked');
      if (skin.vip) card.classList.add('vip-card');
      
      card.innerHTML = `
        ${skin.vip ? '<div class="vip-tag">VIP</div>' : ''}
        <span class="skin-emoji">${skin.emoji}</span>
        <div class="skin-name">${skin.name}</div>
        <div class="skin-rarity rarity-${skin.rarity}">${skin.rarity === 'common' ? 'Обычный' : skin.rarity === 'rare' ? 'Редкий' : skin.rarity === 'epic' ? 'Эпический' : 'Легендарный'}</div>
        <div class="skin-status ${skin.owned ? 'owned' : 'price'}">${skin.owned ? '✅' : `🪙${skin.cost}`}</div>
      `;
      
      card.addEventListener('pointerdown', e => {
        e.preventDefault();
        e.stopPropagation();
        skin.owned ? equipSkin(skin.id) : buySkin(skin.id);
      });
      
      $skinGrid.appendChild(card);
    });
  }
  
  function rectHit(a,b) { return !(b.x>a.x+a.w||b.x+b.w<a.x||b.y>a.y+a.h||b.y+b.h<a.y); }
  function circHit(x1,y1,r1,x2,y2,r2) { return Math.hypot(x1-x2,y1-y2)<r1+r2; }
  
  function hurtPlayer() {
    if (!gameActive || player.invTimer > 0) return;
    player.hp--;
    player.invTimer = 35;
    if (player.hp <= 0) { player.hp = 0; gameActive = false; }
    updateUI();
  }
  
  function doFlap() {
    if (!gameActive) return;
    if (player.y <= CEILING + 15) { player.vy = Math.max(player.vy, -2); return; }
    if (flapCount >= player.maxFlaps) return;
    player.vy = player.jumpPower;
    flapCount++;
    flapCooldown = 16;
    const skin = getSkin();
    if (skin.effect) {
      for (let i=0;i<5;i++) {
        particles.push({
          x:player.x+player.w/2, y:player.y+player.h,
          vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2-1,
          life:18, maxLife:18, color:skin.body
        });
      }
    }
  }
  
  function spawnObstacles() {
    if (!gameActive) return;
    const count = diffLevel >= 7 ? 3 : 2;
    const positions = ['top','bottom'];
    if (count >= 3 || Math.random() < 0.3) positions.push('center');
    
    positions.forEach((pos,i) => {
      let y,w,h,type;
      const r = Math.random();
      if (pos==='top') { w=50+Math.random()*30; h=24+Math.random()*16; y=CEILING+10+Math.random()*55; type=r<0.5?'car':'log'; }
      else if (pos==='bottom') { w=50+Math.random()*30; h=24+Math.random()*16; y=GROUND_Y-h-Math.random()*50; type=r<0.5?'car':'log'; }
      else { w=20; h=50+Math.random()*40; y=currentWorldH/2-h/2+Math.random()*100-50; type='pole'; }
      
      const spawnX = isLandscape ? currentWorldW + 50 : currentWorldW + 30;
      obstacles.push({x:spawnX+i*40, y, w, h, type, pos, active:true, passed:false});
    });
  }
  
  function spawnCoin() {
    if (!gameActive) return;
    const spawnX = isLandscape ? currentWorldW + 50 : currentWorldW + 35;
    coins.push({x:spawnX, y:currentWorldH/2-100+Math.random()*200, r:12, active:true});
  }
  
  function update() {
    if (!gameActive) { inputQueue.flap = false; return; }
    ticks++;
    if (ticks%220===0 && diffLevel<10) { diffLevel++; updateUI(); }
    worldSpeed = Math.min(12, 4.0 + (diffLevel-1)*0.75);
    
    if (flapCooldown>0) { flapCooldown--; if (flapCooldown<=0) flapCount=0; }
    if (inputQueue.flap) { doFlap(); inputQueue.flap = false; }
    if (inputQueue.dive) { player.vy = 5.5; inputQueue.dive = false; }
    
    player.vy += player.gravity;
    player.y += player.vy;
    if (player.y<CEILING) { player.y=CEILING; player.vy=Math.max(0,player.vy); }
    if (player.y+player.h>GROUND_Y) { player.y=GROUND_Y-player.h; player.vy=0; flapCount=0; }
    if (player.invTimer>0) player.invTimer--;
    
    for (let i=particles.length-1;i>=0;i--) { const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; if (p.life<=0) particles.splice(i,1); }
    for (let i=obstacles.length-1;i>=0;i--) { const o=obstacles[i]; o.x-=worldSpeed; if (!o.passed&&o.x+o.w<player.x) { o.passed=true; score+=5; } if (o.x+o.w<-40) obstacles.splice(i,1); }
    for (let i=coins.length-1;i>=0;i--) { const c=coins[i]; c.x-=worldSpeed; if (c.x+c.r<-20) coins.splice(i,1); }
    
    const pr = {x:player.x,y:player.y,w:player.w,h:player.h};
    for (let i=obstacles.length-1;i>=0;i--) { if (rectHit(pr,obstacles[i])) { hurtPlayer(); obstacles.splice(i,1); break; } }
    
    const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
    for (let i=coins.length-1;i>=0;i--) { if (circHit(pcx,pcy,20,coins[i].x,coins[i].y,coins[i].r)) { coins.splice(i,1); totalCoins+=10; score+=15; save(); updateUI(); } }
    
    if (--spawnTimer<=0) { spawnObstacles(); spawnTimer=Math.max(26,55-diffLevel*3)+Math.floor(Math.random()*16); }
    if (--coinTimer<=0) { spawnCoin(); coinTimer=Math.max(24,40-diffLevel*1.5)+Math.floor(Math.random()*18); }
  }
  
  function drawPlayer() {
    const skin = getSkin();
    ctx.save();
    
    if (player.invTimer > 0 && Math.floor(Date.now()/100) % 2 === 0) ctx.globalAlpha = 0.5;
    
    let glowSize = 14;
    if (skin.rarity === 'rare') glowSize = 18;
    else if (skin.rarity === 'epic') glowSize = 22;
    else if (skin.rarity === 'legendary') glowSize = 28;
    
    ctx.shadowColor = skin.rarity === 'legendary' ? '#ffd700' : skin.body;
    ctx.shadowBlur = glowSize;
    
    ctx.fillStyle = skin.body;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(player.x, player.y, player.w, player.h, 12);
    else ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fill();
    
    ctx.fillStyle = skin.eye;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(player.x+4, player.y+4, player.w-8, player.h-8, 8);
    else ctx.fillRect(player.x+4, player.y+4, player.w-8, player.h-8);
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x+12, player.y+16, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(player.x+28, player.y+16, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(player.x+14, player.y+15, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(player.x+30, player.y+15, 2.5, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = skin.vip ? '#ffd700' : '#f39c12';
    ctx.beginPath();
    ctx.moveTo(player.x+20, player.y+22);
    ctx.lineTo(player.x+14, player.y+27);
    ctx.lineTo(player.x+26, player.y+27);
    ctx.fill();
    
    if (skin.vip) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '16px sans-serif';
      ctx.fillText('👑', player.x+10, player.y-10);
    }
    
    ctx.restore();
  }
  
  function draw() {
    ctx.clearRect(0,0,currentWorldW,currentWorldH);
    
    const grad = ctx.createLinearGradient(0,0,currentWorldW,0);
    grad.addColorStop(0,'#1a2332'); grad.addColorStop(1,'#2d3a4f');
    ctx.fillStyle = grad; ctx.fillRect(0,0,currentWorldW,currentWorldH);
    
    ctx.fillStyle = 'rgba(231,76,60,0.06)';
    ctx.fillRect(0,CEILING,currentWorldW,currentWorldH*0.15);
    ctx.fillRect(0,currentWorldH*0.75,currentWorldW,currentWorldH*0.25);
    
    const safeTop = currentWorldH*0.2;
    const safeH = currentWorldH*0.6;
    ctx.fillStyle = 'rgba(46,204,113,0.08)';
    ctx.fillRect(0,safeTop,currentWorldW,safeH);
    ctx.strokeStyle = 'rgba(46,204,113,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([8,8]);
    ctx.strokeRect(3,safeTop,currentWorldW-6,safeH);
    ctx.setLineDash([]);
    
    ctx.strokeStyle = '#3f5068'; ctx.lineWidth = 1;
    for (let i=0;i<currentWorldH;i+=45) {
      const off = (ticks*worldSpeed*0.3)%45;
      ctx.beginPath();
      ctx.moveTo(0,i+off);
      ctx.lineTo(currentWorldW,i+off-12);
      ctx.stroke();
    }
    
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(0,GROUND_Y,currentWorldW,currentWorldH-GROUND_Y);
    ctx.fillStyle = '#5e4a32';
    ctx.fillRect(0,GROUND_Y,currentWorldW,5);
    
    particles.forEach(p => {
      ctx.globalAlpha = p.life/p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    coins.forEach(c => {
      ctx.save();
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#FFC107';
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFA000';
      ctx.beginPath(); ctx.arc(c.x-1,c.y-1,c.r-4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('🪙',c.x-9,c.y+6);
      ctx.restore();
    });
    
    obstacles.forEach(o => {
      ctx.save();
      ctx.shadowColor = '#00000060'; ctx.shadowBlur = 10;
      const cl = o.pos==='top' ? ['#e74c3c','#c0392b'] : o.pos==='bottom' ? ['#e67e22','#d35400'] : ['#8e44ad','#71368a'];
      
      if (o.type==='pole') {
        ctx.fillStyle = cl[0]; ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle = cl[1]; ctx.fillRect(o.x+3,o.y+4,o.w-6,o.h-8);
      } else if (o.type==='car') {
        ctx.fillStyle = cl[0]; ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle = cl[1]; ctx.fillRect(o.x+4,o.y+4,o.w-8,o.h-8);
        ctx.fillStyle = '#f39c12';
        ctx.font = '16px sans-serif';
        ctx.fillText('🚗',o.x+10,o.y+22);
      } else {
        ctx.fillStyle = cl[0]; ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle = cl[1]; ctx.fillRect(o.x+3,o.y+3,o.w-6,o.h-6);
      }
      ctx.restore();
    });
    
    drawPlayer();
    
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Скорость: ${worldSpeed.toFixed(1)}`, 8, CEILING+16);
    ctx.fillText(`HP: ${player.hp}/${maxLives}`, 8, CEILING+30);
    
    if (!gameActive && gameStarted) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0,0,currentWorldW,currentWorldH);
      ctx.fillStyle = '#f7da6c';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('💔 ИГРА ОКОНЧЕНА', currentWorldW/2, currentWorldH/2-25);
      ctx.font = '16px sans-serif';
      ctx.fillText(`Счёт: ${score} | Монеты: ${totalCoins}`, currentWorldW/2, currentWorldH/2+20);
      ctx.font = '13px sans-serif';
      ctx.fillText('Нажмите 🔄 для рестарта', currentWorldW/2, currentWorldH/2+50);
    }
  }
  
  if (!ctx.roundRect) {
    ctx.roundRect = function(x,y,w,h,r) {
      if (typeof r==='number') r={tl:r,tr:r,br:r,bl:r};
      ctx.beginPath();
      ctx.moveTo(x+r.tl,y); ctx.lineTo(x+w-r.tr,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr);
      ctx.lineTo(x+w,y+h-r.br);
      ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
      ctx.lineTo(x+r.bl,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl);
      ctx.lineTo(x,y+r.tl);
      ctx.quadraticCurveTo(x,y,x+r.tl,y);
      ctx.closePath();
    };
  }
  
  function loop() { update(); draw(); requestAnimationFrame(loop); }
  
  function setupEvents() {
    const buttons = {
      btnUp: () => { inputQueue.flap = true; },
      btnDown: () => { inputQueue.dive = true; },
      btnLife: buyLife,
      btnRestart: resetGame,
      btnShop: () => { $shop.classList.toggle('show'); if ($shop.classList.contains('show')) renderShop(); },
      btnCloseShop: () => $shop.classList.remove('show')
    };
    
    Object.entries(buttons).forEach(([id, handler]) => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('pointerdown', e => { e.preventDefault(); handler(); });
    });
    
    $btnBuyLife.addEventListener('pointerdown', e => { e.preventDefault(); buyLife(); });
    $btnShopLife.addEventListener('pointerdown', e => { e.preventDefault(); buyLife(); });
    
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' || e.key === ' ' || e.code === 'Space') {
        e.preventDefault(); inputQueue.flap = true;
      } else if (e.key === 'ArrowDown') {
        e.preventDefault(); inputQueue.dive = true;
      } else if (e.key === 'r' || e.key === 'R') {
        e.preventDefault(); resetGame();
      } else if (e.key === 'l' || e.key === 'L') {
        e.preventDefault(); buyLife();
      }
    });
    
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touchY = (e.touches[0].clientY - rect.top) * (currentWorldH / rect.height);
      if (touchY < currentWorldH * 0.5) inputQueue.flap = true;
      else inputQueue.dive = true;
    }, { passive: false });
    
    canvas.addEventListener('mousedown', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mouseY = (e.clientY - rect.top) * (currentWorldH / rect.height);
      if (mouseY < currentWorldH * 0.5) inputQueue.flap = true;
      else inputQueue.dive = true;
    });
    
    document.addEventListener('pointerdown', e => {
      if ($shop.classList.contains('show') && !$shop.contains(e.target) && e.target.id !== 'btnShop') {
        $shop.classList.remove('show');
      }
    });
  }
  
  player.hp = maxLives;
  gameActive = true;
  resize();
  updateUI();
  renderShop();
  setupEvents();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
