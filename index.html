<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, orientation: portrait">
  <title>Flappy Road · Верх и низ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 8px;
      margin: 0;
    }
    .game-container {
      background: linear-gradient(165deg, #1a2332, #0a0f18);
      border-radius: 28px;
      padding: 12px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 420px;
      width: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 400px;
      aspect-ratio: 400 / 600;
      border-radius: 20px;
      background: #0f1822;
      box-shadow: inset 0 0 30px #00000080;
      touch-action: none;
    }
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 4px;
      padding: 0 8px;
      gap: 6px;
    }
    .hearts {
      font-size: 1.2rem;
      letter-spacing: 3px;
    }
    .coins-display {
      background: #f0a04b;
      color: #161c28;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 800;
      box-shadow: 0 0 12px #ff9933;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .difficulty-badge {
      background: #27ae60;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin: 6px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ctrl-btn {
      background: linear-gradient(180deg, #3f4868 0%, #1e2238 100%);
      border: none;
      color: white;
      font-weight: bold;
      font-size: 0.95rem;
      padding: 12px 18px;
      border-radius: 40px;
      box-shadow: 0 5px 0 #0b0d15;
      cursor: pointer;
      touch-action: manipulation;
      transition: 0.06s;
      text-transform: uppercase;
    }
    .ctrl-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #0b0d15;
    }
    .restart-btn {
      background: linear-gradient(180deg, #c94b4b, #701e1e);
    }
    .shop-btn {
      background: linear-gradient(180deg, #f39c12, #d68910);
      color: #1a1a2e;
    }
    .shop-panel {
      display: none;
      width: 100%;
      background: #1e2a3a;
      border-radius: 16px;
      padding: 12px;
      margin-top: 6px;
      box-shadow: inset 0 0 15px #00000060;
      max-height: 300px;
      overflow-y: auto;
    }
    .shop-panel.active {
      display: block;
    }
    .shop-title {
      color: #f7da6c;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 8px;
      text-align: center;
    }
    .skin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .skin-card {
      background: #232d3d;
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
      position: relative;
    }
    .skin-card.selected {
      border-color: #f7da6c;
      box-shadow: 0 0 18px #f7da6c80;
      background: #2a3550;
    }
    .skin-card.locked {
      opacity: 0.7;
    }
    .skin-preview {
      width: 50px;
      height: 50px;
      margin: 0 auto 6px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .skin-name {
      color: #ddd;
      font-size: 0.7rem;
      margin: 4px 0;
      font-weight: bold;
    }
    .skin-price {
      color: #f0a04b;
      font-weight: bold;
      font-size: 0.75rem;
    }
    .skin-owned {
      color: #27ae60;
      font-weight: bold;
      font-size: 0.7rem;
    }
    .vip-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ffd700;
      color: #1a1a2e;
      border-radius: 10px;
      padding: 2px 6px;
      font-size: 0.6rem;
      font-weight: bold;
    }
    .close-shop {
      background: #c94b4b;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .hint-text {
      color: #9aa0c0;
      font-size: 0.65rem;
      text-align: center;
      margin-top: 2px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  
  <div class="top-bar">
    <span class="hearts" id="heartsDisplay">❤️❤️❤️</span>
    <span class="difficulty-badge" id="diffDisplay">⚡ ЛЕГКО</span>
    <span class="coins-display" id="coinsDisplay">🪙 0</span>
  </div>
  
  <div class="controls">
    <button class="ctrl-btn" id="upBtn">⬆️ ВВЕРХ</button>
    <button class="ctrl-btn" id="downBtn">⬇️ ВНИЗ</button>
    <button class="ctrl-btn restart-btn" id="restartBtn">🔄 СТАРТ</button>
    <button class="ctrl-btn shop-btn" id="shopToggleBtn">🛒 СКИНЫ</button>
  </div>
  
  <div class="shop-panel" id="shopPanel">
    <div class="shop-title">🛍️ КОЛЛЕКЦИЯ СКИНОВ</div>
    <div class="skin-grid" id="skinGrid"></div>
    <button class="close-shop" id="closeShopBtn">✕ Закрыть магазин</button>
  </div>
  
  <div class="hint-text">Верх/низ — опасно • Центр — безопасно</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const heartsDisplay = document.getElementById('heartsDisplay');
  const coinsDisplay = document.getElementById('coinsDisplay');
  const diffSpan = document.getElementById('diffDisplay');
  const shopPanel = document.getElementById('shopPanel');
  const skinGrid = document.getElementById('skinGrid');

  // ─── СОХРАНЕНИЕ ───
  function saveData() {
    try {
      localStorage.setItem('flappyCoins', totalCoins.toString());
      localStorage.setItem('flappySkin', equippedSkinId);
      skins.forEach(s => {
        localStorage.setItem('flappy_own_' + s.id, s.owned.toString());
      });
    } catch(e) {}
  }
  
  function loadData() {
    try {
      totalCoins = parseInt(localStorage.getItem('flappyCoins') || '0');
      equippedSkinId = localStorage.getItem('flappySkin') || 'default';
      skins.forEach(s => {
        if (s.id !== 'default') {
          s.owned = localStorage.getItem('flappy_own_' + s.id) === 'true';
        }
      });
    } catch(e) {
      totalCoins = 0;
      equippedSkinId = 'default';
    }
  }

  let totalCoins = 0;
  
  const skins = [
    { id: 'default', name: 'Птенчик', emoji: '🐤', price: 0, owned: true, bodyColor: '#4ecdc4', eyeColor: '#44bd9e', effect: null },
    { id: 'dragon', name: 'Дракон', emoji: '🐲', price: 80, owned: false, bodyColor: '#e74c3c', eyeColor: '#ff6b35', effect: 'fire' },
    { id: 'robot', name: 'Робот', emoji: '🤖', price: 120, owned: false, bodyColor: '#95a5a6', eyeColor: '#3498db', effect: 'electric' },
    { id: 'ninja', name: 'Ниндзя', emoji: '🥷', price: 150, owned: false, bodyColor: '#2c3e50', eyeColor: '#e74c3c', effect: 'shadow' },
    { id: 'unicorn', name: 'Единорог', emoji: '🦄', price: 200, owned: false, bodyColor: '#e8a0bf', eyeColor: '#9b59b6', effect: 'sparkle' },
    { id: 'phoenix', name: '👑 Феникс', emoji: '🔥', price: 350, owned: false, bodyColor: '#ff6b35', eyeColor: '#ffd700', effect: 'phoenix', vip: true },
  ];
  
  let equippedSkinId = 'default';
  loadData();
  
  function getEquippedSkin() {
    return skins.find(s => s.id === equippedSkinId) || skins[0];
  }
  
  function buySkin(skinId) {
    const skin = skins.find(s => s.id === skinId);
    if (!skin || skin.owned) return false;
    if (totalCoins >= skin.price) {
      totalCoins -= skin.price;
      skin.owned = true;
      equippedSkinId = skinId;
      saveData();
      updateUI();
      renderShop();
      return true;
    }
    return false;
  }
  
  function equipSkin(skinId) {
    const skin = skins.find(s => s.id === skinId);
    if (skin && skin.owned) {
      equippedSkinId = skinId;
      saveData();
      updateUI();
      renderShop();
    }
  }

  function updateUI() {
    let h = '';
    for (let i = 0; i < MAX_LIVES; i++) {
      h += i < player.health ? '❤️' : '🖤';
    }
    heartsDisplay.textContent = h;
    coinsDisplay.textContent = `🪙 ${totalCoins}`;
    
    let dt = '⚡ ЛЕГКО', dc = '#27ae60';
    if (difficultyLevel >= 8) { dt = '💀 ХАРД'; dc = '#8e44ad'; }
    else if (difficultyLevel >= 6) { dt = '🔥 СЛОЖНО'; dc = '#e74c3c'; }
    else if (difficultyLevel >= 4) { dt = '⚠️ СРЕДНЕ'; dc = '#f39c12'; }
    diffSpan.textContent = dt;
    diffSpan.style.background = dc;
  }

  function renderShop() {
    skinGrid.innerHTML = '';
    skins.forEach(skin => {
      const card = document.createElement('div');
      card.className = 'skin-card';
      if (skin.id === equippedSkinId) card.classList.add('selected');
      if (!skin.owned) card.classList.add('locked');
      
      card.innerHTML = `
        ${skin.vip ? '<div class="vip-badge">VIP</div>' : ''}
        <div class="skin-preview" style="background:${skin.bodyColor}40; border:2px solid ${skin.bodyColor}">${skin.emoji}</div>
        <div class="skin-name">${skin.name}</div>
        ${skin.owned ? '<div class="skin-owned">✅ Выбрать</div>' : `<div class="skin-price">🪙 ${skin.price}</div>`}
      `;
      
      card.addEventListener('click', () => {
        if (skin.owned) equipSkin(skin.id);
        else if (!buySkin(skin.id)) alert(`Недостаточно монет! Нужно ${skin.price} 🪙`);
      });
      
      skinGrid.appendChild(card);
    });
  }

  // ─── ИГРА ───
  let gameActive = true;
  let score = 0;
  let survivalTime = 0;
  let difficultyLevel = 1;
  const MAX_LIVES = 3;
  
  const CEILING_LIMIT = 60;
  const MAX_FLAPS = 5;
  let flapCount = 0;
  let flapResetTimer = 0;

  const player = {
    x: 85,
    y: H/2 - 22,
    width: 40,
    height: 40,
    health: MAX_LIVES,
    maxHealth: MAX_LIVES,
    velocityY: 0,
    gravity: 0.38,
    flapPower: -6.5,
    invincible: false,
    invincibleTimer: 0
  };

  let obstacles = [];
  let coins = [];
  let spawnTimer = 0;
  let coinTimer = 0;
  const BASE_SPAWN = 55;
  let currentSpawnDelay = BASE_SPAWN;
  const BASE_COIN = 40;
  let currentCoinDelay = BASE_COIN;
  let baseSpeed = 4.0;
  let currentSpeed = baseSpeed;
  const MAX_SPEED = 12;
  let flapRequested = false;
  let effectParticles = [];

  class Obstacle {
    constructor(y, w, h, type, position) {
      this.x = W + 30;
      this.y = y;
      this.width = w;
      this.height = h;
      this.type = type;
      this.position = position; // 'top', 'bottom', 'center'
      this.active = true;
      this.passed = false;
    }
  }
  
  class Coin {
    constructor(y) {
      this.x = W + 35;
      this.y = y;
      this.radius = 13;
      this.active = true;
    }
  }
  
  class Particle {
    constructor(x, y, color, life) {
      this.x = x; this.y = y; this.color = color;
      this.life = life; this.maxLife = life;
      this.vx = (Math.random()-0.5)*2;
      this.vy = (Math.random()-0.5)*2 - 1;
    }
  }

  function resetGame() {
    gameActive = true;
    player.health = MAX_LIVES;
    player.y = H/2 - 22;
    player.velocityY = 0;
    player.invincible = false;
    player.invincibleTimer = 0;
    obstacles = [];
    coins = [];
    effectParticles = [];
    score = 0;
    survivalTime = 0;
    difficultyLevel = 1;
    spawnTimer = 0;
    coinTimer = 0;
    currentSpeed = baseSpeed;
    currentSpawnDelay = BASE_SPAWN;
    currentCoinDelay = BASE_COIN;
    flapCount = 0;
    flapResetTimer = 0;
    flapRequested = false;
    updateUI();
  }

  function rectCollide(r1, r2) {
    return !(r2.x > r1.x + r1.width || r2.x + r2.width < r1.x ||
      r2.y > r1.y + r1.height || r2.y + r2.height < r1.y);
  }
  
  function circleCollide(x1, y1, r1, x2, y2, r2) {
    return Math.hypot(x1-x2, y1-y2) < r1+r2;
  }

  function damagePlayer(amount=1) {
    if (!gameActive || player.invincible) return;
    player.health -= amount;
    player.invincible = true;
    player.invincibleTimer = 40;
    if (player.health <= 0) {
      player.health = 0;
      gameActive = false;
    }
    updateUI();
  }

  function flap() {
    if (!gameActive) return;
    if (player.y <= CEILING_LIMIT + 20) {
      player.velocityY = Math.max(player.velocityY, -3);
      return;
    }
    if (flapCount >= MAX_FLAPS) return;
    
    player.velocityY = player.flapPower;
    flapCount++;
    flapResetTimer = 20;
    
    const skin = getEquippedSkin();
    if (skin.effect) {
      for (let i=0; i<4; i++) {
        effectParticles.push(new Particle(player.x + player.width/2, player.y + player.height, skin.bodyColor, 18));
      }
    }
  }

  function spawnObstacles() {
    if (!gameActive) return;
    
    // Спавним 2-3 препятствия: сверху и снизу, иногда в центре
    const count = difficultyLevel >= 7 ? 3 : 2;
    
    // Позиции для препятствий
    const positions = [];
    
    // Всегда спавним сверху и снизу
    positions.push('top');
    positions.push('bottom');
    
    // Иногда добавляем центральное (30% шанс)
    if (count >= 3 || Math.random() < 0.3) {
      positions.push('center');
    }
    
    for (let i = 0; i < positions.length; i++) {
      const pos = positions[i];
      const r = Math.random();
      let y, w, h, type;
      
      if (pos === 'top') {
        // Верхние препятствия
        w = 50 + Math.random() * 30;
        h = 25 + Math.random() * 15;
        y = CEILING_LIMIT + 10 + Math.random() * 60;
        type = r < 0.5 ? 'car' : 'log';
      } else if (pos === 'bottom') {
        // Нижние препятствия
        w = 50 + Math.random() * 30;
        h = 25 + Math.random() * 15;
        y = H - 100 - h - Math.random() * 50;
        type = r < 0.5 ? 'car' : 'log';
      } else {
        // Центральное препятствие (редкое)
        w = 22;
        h = 50 + Math.random() * 40;
        y = 220 + Math.random() * 160;
        type = 'pole';
      }
      
      const obs = new Obstacle(y, w, h, type, pos);
      obs.x += i * 40;
      obstacles.push(obs);
    }
  }

  function spawnCoin() {
    if (!gameActive) return;
    // Монеты в основном в центральной безопасной зоне
    const y = 180 + Math.random() * 240;
    coins.push(new Coin(y));
  }

  function updateDifficulty() {
    survivalTime++;
    if (survivalTime % 240 === 0 && difficultyLevel < 10) {
      difficultyLevel++;
      updateUI();
    }
    currentSpeed = Math.min(MAX_SPEED, baseSpeed + (difficultyLevel-1)*0.7);
    currentSpawnDelay = Math.max(28, BASE_SPAWN - (difficultyLevel-1)*3);
    currentCoinDelay = Math.max(25, BASE_COIN - (difficultyLevel-1)*1.5);
  }

  function update() {
    if (!gameActive) { flapRequested = false; return; }
    
    updateDifficulty();
    
    if (flapResetTimer > 0) {
      flapResetTimer--;
      if (flapResetTimer <= 0) flapCount = 0;
    }
    
    if (flapRequested) { flap(); flapRequested = false; }
    
    player.velocityY += player.gravity;
    player.y += player.velocityY;
    
    if (player.y < CEILING_LIMIT) {
      player.y = CEILING_LIMIT;
      player.velocityY = Math.max(0, player.velocityY);
    }
    
    if (player.y + player.height > H-75) { 
      player.y = H-75-player.height; 
      player.velocityY = 0; 
      flapCount = 0;
    }
    
    if (player.invincible) {
      player.invincibleTimer--;
      if (player.invincibleTimer <= 0) player.invincible = false;
    }
    
    // Частицы
    for (let i = effectParticles.length-1; i >= 0; i--) {
      const p = effectParticles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) effectParticles.splice(i, 1);
    }
    
    // Препятствия
    for (let i = obstacles.length-1; i >= 0; i--) {
      const obs = obstacles[i];
      obs.x -= currentSpeed;
      if (!obs.passed && obs.x + obs.width < player.x) {
        obs.passed = true;
        score += 5;
      }
      if (obs.x + obs.width < -40) obstacles.splice(i, 1);
    }
    
    // Монеты
    for (let i = coins.length-1; i >= 0; i--) {
      const c = coins[i];
      c.x -= currentSpeed;
      if (c.x + c.radius < -20) coins.splice(i, 1);
    }
    
    // Столкновения
    const pRect = {x:player.x, y:player.y, width:player.width, height:player.height};
    for (let i = obstacles.length-1; i >= 0; i--) {
      const obs = obstacles[i];
      if (rectCollide(pRect, {x:obs.x, y:obs.y, width:obs.width, height:obs.height})) {
        damagePlayer(1);
        obstacles.splice(i, 1);
        break;
      }
    }
    
    // Сбор монет
    for (let i = coins.length-1; i >= 0; i--) {
      const c = coins[i];
      if (circleCollide(player.x+player.width/2, player.y+player.height/2, 20, c.x, c.y, c.radius)) {
        coins.splice(i, 1);
        totalCoins += 10;
        score += 15;
        saveData();
        updateUI();
      }
    }
    
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnObstacles();
      spawnTimer = currentSpawnDelay + Math.floor(Math.random()*18);
    }
    
    coinTimer--;
    if (coinTimer <= 0) {
      spawnCoin();
      coinTimer = currentCoinDelay + Math.floor(Math.random()*20);
    }
    
    if (player.health <= 0) {
      gameActive = false;
      updateUI();
    }
  }

  function drawPlayer() {
    const skin = getEquippedSkin();
    ctx.save();
    
    if (player.invincible && Math.floor(Date.now()/100)%2===0) ctx.globalAlpha = 0.6;
    
    ctx.shadowColor = skin.vip ? '#ffd700' : skin.bodyColor;
    ctx.shadowBlur = skin.vip ? 25 : 16;
    
    ctx.fillStyle = skin.bodyColor;
    ctx.beginPath();
    ctx.roundRect(player.x, player.y, player.width, player.height, 14);
    ctx.fill();
    
    ctx.fillStyle = skin.eyeColor;
    ctx.beginPath();
    ctx.roundRect(player.x+4, player.y+4, player.width-8, player.height-8, 10);
    ctx.fill();
    
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(player.x+12, player.y+16, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(player.x+28, player.y+16, 6, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(player.x+14, player.y+15, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(player.x+30, player.y+15, 3, 0, Math.PI*2); ctx.fill();
    
    if (skin.id === 'dragon') {
      ctx.fillStyle = '#ff6b35';
      ctx.beginPath(); ctx.moveTo(player.x+8, player.y+5); ctx.lineTo(player.x+4, player.y-8); ctx.lineTo(player.x+14, player.y+3); ctx.fill();
      ctx.beginPath(); ctx.moveTo(player.x+32, player.y+5); ctx.lineTo(player.x+36, player.y-8); ctx.lineTo(player.x+28, player.y+3); ctx.fill();
    } else if (skin.id === 'robot') {
      ctx.fillStyle = '#3498db';
      ctx.fillRect(player.x+18, player.y-8, 4, 10);
      ctx.beginPath(); ctx.arc(player.x+20, player.y-10, 4, 0, Math.PI*2); ctx.fill();
    } else if (skin.id === 'unicorn') {
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.moveTo(player.x+20, player.y-10); ctx.lineTo(player.x+16, player.y+4); ctx.lineTo(player.x+24, player.y+4); ctx.fill();
    }
    
    ctx.fillStyle = skin.vip ? '#ffd700' : '#f39c12';
    ctx.beginPath();
    ctx.moveTo(player.x+20, player.y+22); ctx.lineTo(player.x+14, player.y+28); ctx.lineTo(player.x+26, player.y+28);
    ctx.closePath(); ctx.fill();
    
    if (skin.vip) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '16px sans-serif';
      ctx.fillText('👑', player.x+10, player.y-8);
    }
    
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    
    const grd = ctx.createLinearGradient(0, 0, W, 0);
    grd.addColorStop(0, '#1a2332'); grd.addColorStop(1, '#2d3a4f');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
    
    // Зоны опасности
    ctx.fillStyle = '#e74c3c10';
    ctx.fillRect(0, CEILING_LIMIT, W, 100);
    ctx.fillRect(0, H-170, W, 100);
    
    // Безопасная центральная зона
    ctx.fillStyle = '#2ecc7120';
    ctx.fillRect(0, 200, W, 200);
    ctx.strokeStyle = '#2ecc7140';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 8]);
    ctx.strokeRect(5, 200, W-10, 200);
    ctx.setLineDash([]);
    
    // Потолок
    ctx.fillStyle = '#e74c3c20';
    ctx.fillRect(0, 0, W, CEILING_LIMIT);
    ctx.strokeStyle = '#e74c3c50';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 10]);
    ctx.beginPath(); ctx.moveTo(0, CEILING_LIMIT); ctx.lineTo(W, CEILING_LIMIT); ctx.stroke();
    ctx.setLineDash([]);
    
    // Декоративные линии
    ctx.strokeStyle = '#3f5068'; ctx.lineWidth = 1.5;
    for (let i=0; i<H; i+=50) {
      const off = (survivalTime*currentSpeed*0.3)%50;
      ctx.beginPath(); ctx.moveTo(0, i+off); ctx.lineTo(W, i+off-15); ctx.stroke();
    }
    
    // Земля
    ctx.fillStyle = '#3a2a1a'; ctx.fillRect(0, H-70, W, 70);
    ctx.fillStyle = '#5e4a32'; ctx.fillRect(0, H-70, W, 6);
    
    // Частицы
    for (let p of effectParticles) {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Монеты
    for (let c of coins) {
      ctx.save();
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 14;
      ctx.fillStyle = '#FFC107';
      ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFA000';
      ctx.beginPath(); ctx.arc(c.x-1, c.y-1, c.radius-4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = 'bold 15px sans-serif';
      ctx.fillText('🪙', c.x-10, c.y+7);
      ctx.restore();
    }
    
    // Препятствия
    for (let obs of obstacles) {
      ctx.save();
      ctx.shadowColor = '#00000080'; ctx.shadowBlur = 12;
      
      // Цвет зависит от позиции
      let color1, color2;
      if (obs.position === 'top') {
        color1 = '#e74c3c'; color2 = '#c0392b';
      } else if (obs.position === 'bottom') {
        color1 = '#e67e22'; color2 = '#d35400';
      } else {
        color1 = '#8e44ad'; color2 = '#71368a';
      }
      
      if (obs.type === 'pole') {
        ctx.fillStyle = color1;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.fillStyle = color2;
        ctx.fillRect(obs.x+3, obs.y+4, obs.width-6, obs.height-8);
      } else if (obs.type === 'car') {
        ctx.fillStyle = color1;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.fillStyle = color2;
        ctx.fillRect(obs.x+4, obs.y+4, obs.width-8, obs.height-8);
        ctx.fillStyle = '#f39c12';
        ctx.font = '18px sans-serif';
        ctx.fillText('🚗', obs.x+10, obs.y+26);
      } else {
        ctx.fillStyle = color1;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.fillStyle = color2;
        ctx.fillRect(obs.x+4, obs.y+3, obs.width-8, obs.height-6);
      }
      ctx.restore();
    }
    
    drawPlayer();
    
    // Статистика
    ctx.fillStyle = '#ffffff90';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Скорость: ${currentSpeed.toFixed(1)}`, 10, CEILING_LIMIT+18);
    ctx.fillText(`Препятствий: ${obstacles.length}`, 10, CEILING_LIMIT+34);
    ctx.fillText(`⚠️ Верх/низ`, W-90, CEILING_LIMIT+18);
    ctx.fillText(`✅ Центр`, W-65, CEILING_LIMIT+34);
    
    if (!gameActive) {
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#0b0e14';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#f7da6c';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('💔 ИГРА ОКОНЧЕНА', W/2, H/2-30);
      ctx.font = '18px sans-serif';
      ctx.fillText(`Счёт: ${score} | Монет: ${totalCoins}`, W/2, H/2+15);
      ctx.font = '14px sans-serif';
      ctx.fillText('Нажми СТАРТ для новой игры', W/2, H/2+40);
    }
  }

  if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
      ctx.beginPath();
      ctx.moveTo(x + r.tl, y); ctx.lineTo(x + w - r.tr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
      ctx.lineTo(x + w, y + h - r.br);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
      ctx.lineTo(x + r.bl, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
      ctx.lineTo(x, y + r.tl);
      ctx.quadraticCurveTo(x, y, x + r.tl, y);
      ctx.closePath();
    };
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  function attachEvents() {
    document.getElementById('upBtn').addEventListener('click', (e) => {
      e.preventDefault(); flapRequested = true;
    });
    document.getElementById('downBtn').addEventListener('click', (e) => {
      e.preventDefault(); if (gameActive) player.velocityY = 5;
    });
    document.getElementById('restartBtn').addEventListener('click', (e) => {
      e.preventDefault(); resetGame();
    });
    document.getElementById('shopToggleBtn').addEventListener('click', (e) => {
      e.preventDefault();
      shopPanel.classList.toggle('active');
      if (shopPanel.classList.contains('active')) renderShop();
    });
    document.getElementById('closeShopBtn').addEventListener('click', (e) => {
      e.preventDefault(); shopPanel.classList.remove('active');
    });
    
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === ' ' || e.code === 'Space') {
        e.preventDefault(); flapRequested = true;
      } else if (e.key === 'ArrowDown') {
        e.preventDefault(); if (gameActive) player.velocityY = 5;
      } else if (e.key === 'r' || e.key === 'R') {
        e.preventDefault(); resetGame();
      }
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touchY = e.touches[0].clientY - canvas.getBoundingClientRect().top;
      if (touchY < H*0.5) flapRequested = true;
      else if (gameActive) player.velocityY = 5;
    });
    
    canvas.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const mouseY = e.clientY - canvas.getBoundingClientRect().top;
      if (mouseY < H*0.5) flapRequested = true;
      else if (gameActive) player.velocityY = 5;
    });
  }

  updateUI();
  renderShop();
  attachEvents();
  gameLoop();
})();
</script>
</body>
</html>
